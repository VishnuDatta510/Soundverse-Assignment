services:
  - type: web
    name: soundverse
    env: python
    pythonVersion: "3.12.0"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: API_KEY
        sync: false
      - key: AUTO_SQLITE_FALLBACK
        value: "false"
      - key: FORCE_SQLITE_LOCAL
        value: "0"
